apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-active
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.app.name }}
    version: blue
